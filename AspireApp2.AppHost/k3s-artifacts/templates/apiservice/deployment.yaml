---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "apiservice-deployment"
  labels:
    app.kubernetes.io/name: "aspireapp2-apphost"
    app.kubernetes.io/component: "apiservice"
    app.kubernetes.io/instance: "{{.Release.Name}}"
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "aspireapp2-apphost"
        app.kubernetes.io/component: "apiservice"
        app.kubernetes.io/instance: "{{.Release.Name}}"
    spec:

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - turing-two
                - turing-three
                - turing-four
      volumes:
      - name: cert-volume
        secret:
          secretName: aspnet-tls
      containers:
        - image: "{{ .Values.parameters.apiservice.apiservice_image }}"
          name: "apiservice"
          envFrom:
            - configMapRef:
                name: "apiservice-config"
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Staging
            - name: ASPNETCORE_Kestrel__Certificates__Default__Path
              value: "/certs/asp-net.pfx"
            - name: ASPNETCORE_Kestrel__Certificates__Default__Password
              valueFrom:
                secretKeyRef:
                  name: aspnet-tls-pwd
                  key: password
          volumeMounts:
            - name: cert-volume
              mountPath: "/certs"
          ports:
            - name: "http"
              protocol: "TCP"
              containerPort: {{ .Values.parameters.apiservice.port_http }}
            - name: "https"
              protocol: "TCP"
              containerPort: {{ .Values.parameters.apiservice.port_https }}
          imagePullPolicy: "Always"
      imagePullSecrets:
        - name: "regcred"
  selector:
    matchLabels:
      app.kubernetes.io/name: "aspireapp2-apphost"
      app.kubernetes.io/component: "apiservice"
      app.kubernetes.io/instance: "{{.Release.Name}}"
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: "RollingUpdate"
