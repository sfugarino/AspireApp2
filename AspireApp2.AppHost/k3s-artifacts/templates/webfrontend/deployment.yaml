---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "webfrontend-deployment"
  labels:
    app.kubernetes.io/name: "aspireapp2-apphost"
    app.kubernetes.io/component: "webfrontend"
    app.kubernetes.io/instance: "{{.Release.Name}}"
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "aspireapp2-apphost"
        app.kubernetes.io/component: "webfrontend"
        app.kubernetes.io/instance: "{{.Release.Name}}"
    spec:
      volumes:
      - name: cert-volume
        secret:
          secretName: aspnet-tls
      containers:
        - image: "{{ .Values.parameters.webfrontend.webfrontend_image }}"
          name: "webfrontend"
          envFrom:
            - configMapRef:
                name: "webfrontend-config"
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Staging
            - name: ASPNETCORE_Kestrel__Certificates__Default__Path
              value: "/certs/asp-net.pfx"
            - name: ASPNETCORE_Kestrel__Certificates__Default__Password
              valueFrom:
                secretKeyRef:
                  name: aspnet-tls-pwd
                  key: password
          volumeMounts:
            - name: cert-volume
              mountPath: "/certs"
          ports:
            - name: "http"
              protocol: "TCP"
              containerPort: {{ .Values.parameters.webfrontend.port_http }}
            - name: "https"
              protocol: "TCP"
              containerPort: {{ .Values.parameters.webfrontend.port_https }}
          imagePullPolicy: "Always"
      imagePullSecrets:
        - name: "regcred"
  selector:
    matchLabels:
      app.kubernetes.io/name: "aspireapp2-apphost"
      app.kubernetes.io/component: "webfrontend"
      app.kubernetes.io/instance: "{{.Release.Name}}"
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: "RollingUpdate"
